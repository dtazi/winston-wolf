sub_niches:
  - id: edu_university_dorms
    label: University dormitories
    industry: Education
    included: true
    rationale: Direct decision-makers reachable; large universe via IPEDS + ACUHO-I

  - id: edu_boarding_schools
    label: Boarding schools (K-12)
    industry: Education
    included: true
    rationale: ~300 schools globally via TABS, end-to-end manageable

  - id: edu_summer_camps
    label: Summer camps
    industry: Education
    included: false
    rationale: Seasonal/light buyers; defer

  - id: mf_student_housing_operators
    label: Student housing operators
    industry: Multi-family
    included: true
    rationale: ~25 operators control most beds (SHB Top 25)

  - id: mf_coliving_operators
    label: Co-living operators
    industry: Multi-family
    included: true
    rationale: Co-Liv directory covers the small universe

  - id: mf_corporate_housing
    label: Corporate housing
    industry: Multi-family
    included: false
    rationale: Different pain profile (executives, brand-driven); would dilute pitch

  - id: mf_senior_independent_living
    label: Senior independent living
    industry: Multi-family
    included: true
    rationale: Same archetype as AL; included per user decision

  - id: hc_assisted_living
    label: Assisted living
    industry: Healthcare
    included: true
    rationale: Full state licensure data is free and rich

  - id: hc_memory_care
    label: Memory care
    industry: Healthcare
    included: true
    rationale: Mostly operated by AL chains; overlap with Argentum

  - id: hc_skilled_nursing
    label: Skilled nursing facilities
    industry: Healthcare
    included: true
    rationale: CMS Nursing Home Compare = highest-leverage public source on the entire map

  - id: hc_hospitals
    label: Hospitals
    industry: Healthcare
    included: false
    rationale: GPO-bound, cold email is the wrong tool

  - id: hc_hospice
    label: Hospice
    industry: Healthcare
    included: false
    rationale: Low volume per facility; defer

niche_details:
  edu_university_dorms:
    size_estimate: "~900 institutions (IPEDS)"
    procurement_model: internal
    target_titles:
      - Housing Director
      - Director of Residence Life
      - Assistant Director of Housing
      - Facilities Director
    company_size: any
    buying_trigger: Academic calendar (summer turnover); replacement cycle ~7-10 yrs
    value_angle: Durability + cost-per-bed-night + ADA / fire code compliance
    findability: high

  edu_boarding_schools:
    size_estimate: "~300 globally (TABS)"
    procurement_model: internal
    target_titles:
      - Head of School
      - Director of Boarding
      - Director of Facilities
    company_size: small-to-mid
    buying_trigger: Multi-year refresh; new dorm construction
    value_angle: Durability + safety codes + long-life cost framing
    findability: high

  mf_student_housing_operators:
    size_estimate: "~25 operators control most professionally-managed beds"
    procurement_model: internal
    target_titles:
      - VP of Operations
      - Director of Procurement
      - Asset Manager
    company_size: large
    buying_trigger: Academic year refresh; new property openings
    value_angle: Bulk pricing + replacement cycle alignment with academic calendar
    findability: high

  mf_coliving_operators:
    size_estimate: "~30-50 operators globally (small universe)"
    procurement_model: internal
    target_titles:
      - Founder / CEO
      - COO
      - Head of Operations
    company_size: small-to-mid
    buying_trigger: New property launches
    value_angle: Bulk pricing + fast lead times + design flexibility
    findability: medium

  mf_senior_independent_living:
    size_estimate: "~100 large operators (ASHA-tracked)"
    procurement_model: internal
    target_titles:
      - VP of Operations
      - VP of Procurement
      - Director of Capital Expenditure
    company_size: large
    buying_trigger: Property refresh cycles; new community openings
    value_angle: Durability + comfort + fire safety
    findability: high

  hc_assisted_living:
    size_estimate: "~30,000 facilities in US (state licensure)"
    procurement_model: mixed (chain HQ + facility-level)
    target_titles:
      - Executive Director
      - VP of Operations
      - Director of Procurement
    company_size: small-to-large
    buying_trigger: Property refresh; capital expenditure cycle
    value_angle: Durability + cleanability + fire safety + cost-per-bed-night
    findability: medium

  hc_memory_care:
    size_estimate: "~5,000-7,000 dedicated facilities; most operated by AL chains"
    procurement_model: mixed
    target_titles:
      - Executive Director
      - VP of Operations
      - Director of Procurement
    company_size: small-to-large
    buying_trigger: Property refresh; capital expenditure cycle
    value_angle: Cleanability (incontinence-resistant) + durability + safety
    findability: medium

  hc_skilled_nursing:
    size_estimate: "~15,000 SNFs in US (CMS data)"
    procurement_model: operator HQ; GPO involvement common
    target_titles:
      - VP of Operations
      - Director of Procurement
      - Director of Operations
    company_size: small-to-large
    buying_trigger: Capital expenditure cycle; regulatory refresh
    value_angle: Cleanability + durability + pressure-relief spec + cost
    findability: very high

